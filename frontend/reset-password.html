<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — REPLICA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #0b0f19;
        }
        .reset-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <!-- Background glows -->
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <div class="reset-container">
        <!-- Logo -->
        <div class="brand" style="justify-content: center; margin-bottom: 2rem;">
            <i class="fa-solid fa-cube logo-icon"></i>
            <div class="brand-text" style="text-align: left;">
                <h1 style="font-size: 1.5rem; letter-spacing: 2px;">REPLICA</h1>
                <span style="font-size: 0.75rem; letter-spacing: 1px;">Cost Estimation System</span>
            </div>
        </div>

        <!-- Glass Card -->
        <div class="glass-card" id="reset-card">
            <h2 class="card-title" style="text-align: center; font-size: 1.4rem; margin-bottom: 0.5rem;">
                <i class="fa-solid fa-key" style="color: var(--secondary);"></i> Reset Password
            </h2>
            <p class="card-subtitle" style="text-align: center; margin-bottom: 1.5rem;">
                Please choose a secure new password for your account.
            </p>

            <!-- Form -->
            <form id="reset-password-form">
                <div class="form-group">
                    <label class="form-label" for="new-password">New Password</label>
                    <input type="password" id="new-password" class="form-input" required placeholder="Minimum 6 characters" minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label" for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" class="form-input" required placeholder="Re-enter password">
                </div>
                <div id="error-alert" class="badge badge-danger hidden" style="width: 100%; padding: 0.8rem; margin: 1rem 0; text-align: center; display: block; font-size: 0.9rem;">
                    Passwords do not match.
                </div>
                <button type="submit" class="submit-btn margin-top-md" style="width: 100%;">
                    <i class="fa-solid fa-check"></i> Save Password
                </button>
            </form>

            <!-- Success Panel (Hidden by default) -->
            <div id="success-panel" class="hidden" style="text-align: center; padding: 1rem 0;">
                <div style="font-size: 3rem; color: #10b981; margin-bottom: 1rem;">
                    <i class="fa-solid fa-circle-check"></i>
                </div>
                <h3 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--text-main);">Password Updated!</h3>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem; line-height: 1.5;">
                    Your password has been reset successfully. You can now log in to the developer dashboard.
                </p>
                <a href="/" class="submit-btn" style="text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.8rem 1.5rem;">
                    <i class="fa-solid fa-right-to-bracket"></i> Proceed to Login
                </a>
            </div>
        </div>
    </div>

    <script>
        const token = new URLSearchParams(window.location.search).get('token');
        const form = document.getElementById('reset-password-form');
        const errorAlert = document.getElementById('error-alert');
        const successPanel = document.getElementById('success-panel');

        if (!token) {
            form.innerHTML = `
                <div style="text-align: center; padding: 1.5rem 0;">
                    <i class="fa-solid fa-triangle-exclamation" style="font-size: 3rem; color: #f43f5e; margin-bottom: 1rem;"></i>
                    <h3 style="font-weight:700; margin-bottom: 0.5rem;">Invalid Password Reset Request</h3>
                    <p style="color: var(--text-muted); font-size: 0.9rem; line-height: 1.5; margin-bottom: 1.5rem;">
                        No reset token was found in the URL. Please verify your password reset link or request a new reset email.
                    </p>
                    <a href="/" class="submit-btn" style="text-decoration: none; display: inline-block;">Go Back to Homepage</a>
                </div>
            `;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorAlert.classList.add('hidden');

            const password = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (password !== confirmPassword) {
                errorAlert.innerText = 'Passwords do not match.';
                errorAlert.classList.remove('hidden');
                return;
            }

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, new_password: password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    form.classList.add('hidden');
                    successPanel.classList.remove('hidden');
                } else {
                    errorAlert.innerText = data.detail || 'Failed to reset password.';
                    errorAlert.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
                errorAlert.innerText = 'Network error. Please try again.';
                errorAlert.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
